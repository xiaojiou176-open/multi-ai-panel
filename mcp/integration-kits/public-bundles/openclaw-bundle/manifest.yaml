schema_version: 1
kind: agentganggang_host_packet
id: agentganggang-openclaw-bundle
name: AgentGangGang OpenClaw Bundle
description: Repo-owned OpenClaw bundle packet for the AgentGangGang local MCP sidecar.
version: "0.2.2"
license: MIT
homepage: https://xiaojiou176-open.github.io/agentganggang/
repository: https://github.com/xiaojiou176-open/agentganggang
supportTier: public_bundle_ready_unverified_host_lane
